<!DOCTYPE html>
<html>
<head>
  <title>LeadFlow CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020818;
      overflow: hidden;
    }

    /* Animated background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s infinite ease-in-out;
    }

    .orb1 {
      width: 500px; height: 500px;
      background: #4f46e5;
      top: -100px; left: -100px;
      animation-delay: 0s;
    }

    .orb2 {
      width: 400px; height: 400px;
      background: #7c3aed;
      bottom: -100px; right: -100px;
      animation-delay: 3s;
    }

    .orb3 {
      width: 300px; height: 300px;
      background: #06b6d4;
      top: 50%; left: 50%;
      animation-delay: 6s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 48px;
      border-radius: 28px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      animation: slideUp 0.6s ease-out;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99,102,241,0.15);
      border: 1px solid rgba(99,102,241,0.3);
      color: #818cf8;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 6px 12px;
      border-radius: 20px;
      margin-bottom: 16px;
      font-weight: 500;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: #818cf8;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    h2 {
      color: #ffffff;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    h2 span {
      background: linear-gradient(135deg, #818cf8, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #475569;
      font-size: 13px;
      margin-bottom: 32px;
      font-weight: 400;
      line-height: 1.6;
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      margin-bottom: 28px;
    }

    label {
      display: block;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group { margin-bottom: 18px; }

    input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 13px 18px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      font-family: 'Inter', sans-serif;
    }

    input:focus {
      border-color: rgba(99,102,241,0.5);
      background: rgba(99,102,241,0.05);
      box-shadow: 0 0 0 4px rgba(99,102,241,0.08);
    }

    input::placeholder { color: #334155; }

    button {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      letter-spacing: 0.5px;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      transition: left 0.5s;
    }

    button:hover::after { left: 100%; }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(79,70,229,0.4);
    }

    button:active { transform: translateY(0); }

    .success-msg {
      display: none;
      text-align: center;
      color: #4ade80;
      font-size: 13px;
      margin-top: 16px;
      padding: 12px;
      background: rgba(74,222,128,0.08);
      border-radius: 10px;
      border: 1px solid rgba(74,222,128,0.2);
    }

    .footer {
      text-align: center;
      color: #1e293b;
      font-size: 11px;
      margin-top: 20px;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <!-- Background orbs -->
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

  <div class="card">
    <div class="badge">Contact Us</div>
    <h2>Get in <span>Touch</span> 👋</h2>
    <p class="subtitle">Fill in your details and our team will get back to you within 24 hours.</p>
    <div class="divider"></div>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="Your name" />
    </div>

    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="your@email.com" />
    </div>

    <div class="form-group">
      <label>Phone Number</label>
      <input type="text" id="phone" placeholder="+91 9999999999" />
    </div>

    <div class="form-group">
      <label>Company Name</label>
      <input type="text" id="company" placeholder="Your company" />
    </div>

    <button type="button" onclick="submitForm()">Send Message →</button>

    <div class="success-msg" id="successMsg">
      ✅ Thank you! We'll be in touch soon.
    </div>

    <p class="footer">Powered by LeadFlow CRM</p>
  </div>

  <script>
    async function submitForm() {
      const data = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        company: document.getElementById('company').value
      };

      if (!data.name || !data.email) {
        alert('Please fill in at least your name and email.');
        return;
      }

      const response = await fetch('http://localhost:5678/webhook-test/2937f301-34c8-4730-9677-33dfb2c02a98', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      document.getElementById('successMsg').style.display = 'block';
    }
  </script>
</body>
</html>
